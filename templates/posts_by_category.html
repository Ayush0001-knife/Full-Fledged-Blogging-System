{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://getbootstrap.com/docs/4.0/dist/css/bootstrap.min.css" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900" rel="stylesheet">
      <link href="{% static 'css/blog.css' %}" rel="stylesheet">
      <title>{{category.name}}</title>
</head>

<body>
      <h3 class="text-uppercase text-warning" style="letter-spacing: 2px;">Category - {{ category }}</h3>
      <div class="row mb-2">
            {% if posts %}
            {% for post in posts %}
            <div class="col-md-6">
                  <div class="card border-0">
                        <div class="card-body">
                              <h3><a href="#" class="text-dark">{{ post.title }}</a></h3>
                              <small class="mb-1 text-muted">{{ post.created_at | timesince }} ago |
                                    {{ post.author}}</small>
                              <p class="card-text">{{ post.short_description | truncatewords:25 }}</p>
                        </div>
                  </div>
            </div>
            {% endfor %}
            {% else %}
            <p>No posts found</p>
            {% endif %}

      </div>
</body>

</html>
